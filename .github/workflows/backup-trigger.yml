name: 备用触发器

on:
  schedule:
    # UTC 01:15 ≈ 北京时间 09:15，仅工作日
    # 如果主定时任务漏触发，此任务作为保底
    - cron: '15 1 * * 1-5'

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: 检查主任务是否已运行
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 查看今天主任务是否已运行
          TODAY=$(date -u +%Y-%m-%d)
          RUNS=$(gh api repos/${{ github.repository }}/actions/runs \
            --jq ".workflow_runs[] | select(.created_at | startswith(\"$TODAY\")) | select(.name==\"新股/转债上市日期检查\") | .id" \
            2>/dev/null | head -1)
          if [ -n "$RUNS" ]; then
            echo "主任务今天已运行，跳过"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "主任务今天未运行，触发备用"
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: 触发主任务
        if: steps.check.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/dispatches \
            --method POST \
            --field "event_type=daily-check"
          echo "已触发主任务"
