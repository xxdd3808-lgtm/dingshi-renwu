name: 新股/转债上市日期检查

on:
  schedule:
    # 多个时间点触发，提高可靠性
    # GitHub Actions 对低活跃仓库的 schedule 容易漏触发，分散到多个时间点降低全部漏掉的概率
    - cron: '5 1 * * *'      # UTC 01:05 = 北京 09:05，每天
    - cron: '15 1 * * *'     # UTC 01:15 = 北京 09:15，每天
    - cron: '35 1 * * *'     # UTC 01:35 = 北京 09:35，每天
  workflow_dispatch:
    inputs:
      force_push:
        description: 强制推送状态汇总（即使无新发现）
        required: false
        default: "0"
        type: choice
        options:
          - "0"
          - "1"
  repository_dispatch:

# 同一时刻只允许一个检查任务运行，避免并发 push state.json 冲突
concurrency:
  group: daily-check
  cancel-in-progress: false

permissions:
  contents: write
  actions: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install akshare requests

      - name: 检查上市日期并通知
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
          FORCE_PUSH: ${{ github.event.inputs.force_push || '0' }}
        run: python notify.py

      - name: 持久化 state.json（通过 GitHub API，绕过 git push 网络问题）
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! git diff --quiet state.json; then
            python3 persist_state.py
          else
            echo "[INFO] state.json 无变化，跳过提交"
          fi
