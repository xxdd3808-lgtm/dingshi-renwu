name: 新股/转债上市日期检查

on:
  schedule:
    # 多个时间点触发，提高可靠性
    # GitHub Actions 对低活跃仓库的 schedule 容易漏触发，分散到多个时间点降低全部漏掉的概率
    - cron: '5 1 * * *'      # UTC 01:05 = 北京 09:05，每天
    - cron: '15 1 * * *'     # UTC 01:15 = 北京 09:15，每天
    - cron: '35 1 * * *'     # UTC 01:35 = 北京 09:35，每天
  workflow_dispatch:
  repository_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install akshare requests

      - name: 检查上市日期并通知
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        run: python notify.py

      - name: 持久化 state.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          if ! git diff --cached --quiet; then
            git commit -m "update state $(date +%F)"
            git push
          fi
