name: 新股/转债上市日期检查

on:
  schedule:
    # UTC 01:05 ≈ 北京时间 09:05，仅工作日（周一至周五）
    - cron: '5 1 * * 1-5'
  workflow_dispatch:   # 支持手动触发
  repository_dispatch: # 备用触发（外部 cron 可调用 GitHub API 触发）

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install akshare requests

      - name: 检查上市日期并通知
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        run: python notify.py

      # 把 state.json 变更提交回仓库，防止重复通知
      - name: 持久化 state.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          if ! git diff --cached --quiet; then
            git commit -m "update state $(date +%F)"
            git push
          fi
